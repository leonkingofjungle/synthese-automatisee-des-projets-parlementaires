<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dernières lois — résumés</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e3e3e6;
    --accent: #2953a6;
    --pending: #a86b1f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181c;
      --card: #212228;
      --text: #ececec;
      --muted: #9a9a9f;
      --border: #34353c;
      --accent: #7aa2f7;
      --pending: #e0af68;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.25rem 1rem;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 0.25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
  }
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.25rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.25rem;
  }
  .card h2 {
    font-size: 1.05rem;
    margin: 0 0 0.35rem;
  }
  .meta {
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 0.6rem;
  }
  .meta code {
    background: var(--bg);
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
  }
  .resume {
    font-size: 0.92rem;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .status {
    font-size: 0.85rem;
    color: var(--pending);
  }
  .status.error { color: #c0392b; }
  a { color: var(--accent); }
  #state {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 0 1.25rem;
    max-width: 860px;
    margin: 0 auto;
  }
</style>
</head>
<body>
<header>
  <h1>Dernières propositions de loi</h1>
  <div class="subtitle" id="subtitle">Résumés générés avec notre propre prompt Gemini, à partir du PDF officiel</div>
</header>
<div id="state">Chargement…</div>
<main id="list"></main>

<script>
async function getResumes() {
  const res = await fetch("resumes.json", { cache: "no-store" });
  if (!res.ok) throw new Error(`Erreur ${res.status} en chargeant resumes.json`);
  return res.json();
}

function formatDate(iso) {
  if (!iso) return "date inconnue";
  return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
}

function renderCard(doc) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h2>${doc.titre}</h2>
    <div class="meta"><code>${doc.uid}</code> — déposé le ${formatDate(doc.date_depot)}</div>
    <div class="resume"></div>
  `;
  card.querySelector(".resume").textContent = doc.resume;
  return card;
}

// Un document n'est affiché que s'il a un résumé exploitable : les documents
// sans PDF ou en erreur sont déjà absents de resumes.json (voir
// scripts/pdf_summarizer_mcp.py), ce filtre est une seconde barrière côté
// front pour ne jamais faire apparaître de carte vide ou en erreur.
function hasUsableResume(doc) {
  return typeof doc.resume === "string" && doc.resume.trim().length > 0;
}

async function main() {
  const stateEl = document.getElementById("state");
  const listEl = document.getElementById("list");
  try {
    const { generated_at, documents } = await getResumes();
    stateEl.remove();
    if (generated_at) {
      document.getElementById("subtitle").textContent +=
        ` — généré le ${formatDate(generated_at)}`;
    }
    const usable = (documents || []).filter(hasUsableResume);
    if (usable.length === 0) {
      listEl.innerHTML = `<div class="status">Aucun résumé disponible pour le moment. Lancer scripts/pdf_summarizer_mcp.py pour en générer.</div>`;
      return;
    }
    for (const doc of usable) {
      listEl.appendChild(renderCard(doc));
    }
  } catch (err) {
    // Erreur de chargement de resumes.json (fichier absent, JSON invalide, etc.) :
    // c'est un problème d'infra global, pas un souci par document, donc on le
    // signale — mais aucune carte individuelle n'affiche jamais d'erreur.
    stateEl.textContent = `Impossible de charger les résumés — as-tu lancé scripts/pdf_summarizer_mcp.py ?`;
    stateEl.classList.add("error");
  }
}

main();
</script>
</body>
</html>
